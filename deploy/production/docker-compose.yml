services:
  prdkit-homepage:
    image: ${IMAGE_NAME:-ghcr.io/qizhi2design-svg/prdkit-homepage}:${IMAGE_TAG:-latest}
    container_name: prdkit-homepage
    restart: unless-stopped
    ports:
      - '127.0.0.1:3030:3000'
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: '1'
      NEXT_PUBLIC_RELEASE_BASE_URL: ${NEXT_PUBLIC_RELEASE_BASE_URL:-https://www.prdkit.xyz}
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
