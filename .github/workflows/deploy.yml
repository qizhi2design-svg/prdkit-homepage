name: Deploy Homepage

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/qizhi2design-svg/prdkit-homepage
  SERVER_HOST: ${{ vars.SERVER_HOST || '43.153.205.242' }}
  SERVER_USER: ${{ vars.SERVER_USER || 'root' }}
  SERVER_PORT: ${{ vars.SERVER_PORT || '22' }}
  SERVER_DIR: /opt/prdkit-homepage
  NEXT_PUBLIC_RELEASE_BASE_URL: https://www.prdkit.xyz

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/prdkit-homepage
          chmod 600 ~/.ssh/prdkit-homepage
          ssh-keyscan -p "${SERVER_PORT}" -H "${SERVER_HOST}" >> ~/.ssh/known_hosts

      - name: Sync compose file
        shell: bash
        run: |
          set -euo pipefail
          deploy_env="$(mktemp)"
          {
            printf 'IMAGE_NAME=%s\n' "${IMAGE_NAME}"
            printf 'IMAGE_TAG=%s\n' "${GITHUB_SHA}"
            printf 'NEXT_PUBLIC_RELEASE_BASE_URL=%s\n' "${NEXT_PUBLIC_RELEASE_BASE_URL}"
          } > "${deploy_env}"

          ssh -i ~/.ssh/prdkit-homepage -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" \
            "mkdir -p '${SERVER_DIR}'"
          scp -i ~/.ssh/prdkit-homepage -P "${SERVER_PORT}" \
            deploy/production/docker-compose.yml \
            "${SERVER_USER}@${SERVER_HOST}:${SERVER_DIR}/docker-compose.yml"
          scp -i ~/.ssh/prdkit-homepage -P "${SERVER_PORT}" \
            "${deploy_env}" \
            "${SERVER_USER}@${SERVER_HOST}:${SERVER_DIR}/.env"

      - name: Deploy on server
        shell: bash
        env:
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          set -euo pipefail

          if [ -n "${GHCR_READ_TOKEN:-}" ]; then
            printf '%s' "${GHCR_READ_TOKEN}" | ssh -i ~/.ssh/prdkit-homepage -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" \
              "docker login ghcr.io -u qizhi2design-svg --password-stdin"
          fi

          ssh -i ~/.ssh/prdkit-homepage -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" \
            "SERVER_DIR='${SERVER_DIR}' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "${SERVER_DIR}"

          docker compose pull
          docker compose up -d --remove-orphans
          docker compose ps
          curl -fsS http://127.0.0.1:3030/ >/dev/null
          REMOTE
